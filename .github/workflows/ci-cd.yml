name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Build & test (NestJS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npm test

  deploy:
    name: Build & deploy on server
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      # The deploy server is in China and cannot pull from GHCR at usable speed,
      # so we build the image directly on the server (node:22-alpine is cached,
      # npm install uses the China mirror). No container registry needed.
      - name: SSH build & run
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          command_timeout: 20m
          script: |
            set -e
            if [ ! -d ~/moonbot-tutor/.git ]; then
              git clone https://github.com/chimeraHHH/moonbot-tutor ~/moonbot-tutor
            fi
            cd ~/moonbot-tutor
            git fetch --all --prune
            git reset --hard origin/main
            cd backend
            docker build -t moonbot-tutor-backend:ci .
            docker stop moonbot-tutor-backend 2>/dev/null || true
            docker rm moonbot-tutor-backend 2>/dev/null || true
            docker run -d \
              --name moonbot-tutor-backend \
              --restart unless-stopped \
              -p 8088:3000 \
              -e PORT=3000 \
              moonbot-tutor-backend:ci
            docker ps --filter name=moonbot-tutor-backend
