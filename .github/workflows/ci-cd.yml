name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Build & test (NestJS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npm test

  docker:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image name
        id: img
        run: |
          owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/${owner}/moonbot-tutor-backend" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        run: |
          IMAGE="${{ steps.img.outputs.name }}"
          docker build -t "$IMAGE:latest" -t "$IMAGE:${{ github.sha }}" backend

      - name: Push image
        run: |
          IMAGE="${{ steps.img.outputs.name }}"
          docker push "$IMAGE:latest"
          docker push "$IMAGE:${{ github.sha }}"

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read
    steps:
      - name: Resolve image name
        id: img
        run: |
          owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/${owner}/moonbot-tutor-backend" >> "$GITHUB_OUTPUT"

      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE: ${{ steps.img.outputs.name }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          envs: IMAGE
          script: |
            set -e
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull "$IMAGE:latest"
            docker stop moonbot-tutor-backend 2>/dev/null || true
            docker rm moonbot-tutor-backend 2>/dev/null || true
            docker run -d \
              --name moonbot-tutor-backend \
              --restart unless-stopped \
              -p 8088:3000 \
              -e PORT=3000 \
              "$IMAGE:latest"
            docker ps --filter name=moonbot-tutor-backend
