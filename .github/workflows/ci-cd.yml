name: CI/CD

on:
  push:
    branches: [main, 'agent/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  code2video:
    name: Check code2video (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compile Python sources
        run: python -m compileall -q services/code2video/src services/code2video/prompts

      - name: Validate deployment persistence contract
        run: bash scripts/check-deployment-persistence.sh

  test:
    name: Build & test (NestJS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npm test

  frontend:
    name: Build & test (Next.js / OpenMAIC)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm build

  deploy:
    name: Ship & build & run on server
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [code2video, test, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      # The deploy server (China) can't reliably reach GitHub/GHCR, so the runner
      # packs all three services and ships them over SSH; the server builds the
      # images locally and runs them on a shared docker network.
      - name: Pack sources
        run: |
          tar -C backend --exclude=node_modules --exclude=dist --exclude='*.tsbuildinfo' -czf backend-deploy.tar .
          tar -C services/code2video --exclude=__pycache__ --exclude=.venv --exclude='*.pyc' -czf c2v-deploy.tar .
          tar -C frontend \
            --exclude=node_modules \
            --exclude=.next \
            --exclude=.git \
            --exclude=tests \
            --exclude=.pnpm-store \
            --exclude=assets \
            --exclude=public \
            -czf frontend-deploy.tar .
          ls -lh backend-deploy.tar c2v-deploy.tar frontend-deploy.tar

      - name: Ship & build & run on server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
          C2V_LLM_API_KEY: ${{ secrets.C2V_LLM_API_KEY }}
          C2V_LLM_BASE_URL: ${{ secrets.C2V_LLM_BASE_URL }}
          C2V_LLM_MODEL: ${{ secrets.C2V_LLM_MODEL }}
          C2V_LLM_PROVIDER: ${{ secrets.C2V_LLM_PROVIDER }}
          C2V_FIX_MODEL: ${{ secrets.C2V_FIX_MODEL }}
          C2V_TTS_DOUBAO_KEY: ${{ secrets.C2V_TTS_DOUBAO_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_MODELS: ${{ secrets.GOOGLE_MODELS }}
          GOOGLE_VERTEX_PROJECT: ${{ secrets.GOOGLE_VERTEX_PROJECT }}
          GOOGLE_VERTEX_LOCATION: ${{ secrets.GOOGLE_VERTEX_LOCATION }}
          DEFAULT_MODEL: ${{ secrets.DEFAULT_MODEL }}
          MODEL_ROUTES: ${{ secrets.MODEL_ROUTES }}
          AUTH_DB_PASSWORD: ${{ secrets.AUTH_DB_PASSWORD }}
          AUTH_SESSION_SECRET: ${{ secrets.AUTH_SESSION_SECRET }}
          AUTH_ADMIN_IDENTIFIER: ${{ secrets.AUTH_ADMIN_IDENTIFIER }}
          AUTH_ADMIN_PASSWORD: ${{ secrets.AUTH_ADMIN_PASSWORD }}
          AUTH_PUBLIC_URL: http://${{ secrets.SERVER_HOST }}:8089
        run: |
          set -euo pipefail
          REMOTE="$SERVER_USER@$SERVER_HOST"
          SSHOPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=20 -o ServerAliveInterval=30"

          sshpass -p "$SERVER_PASSWORD" scp $SSHOPTS \
            backend-deploy.tar c2v-deploy.tar frontend-deploy.tar \
            "$REMOTE:/home/$SERVER_USER/"

          # Stream shell-escaped secret assignments and a literal script over
          # stdin. Secrets are never expanded into script syntax or staged in a
          # plaintext file on the runner or deployment server.
          {
            printf 'set -e\n'
            printf 'C2V_LLM_API_KEY=%q\n' "$C2V_LLM_API_KEY"
            printf 'C2V_LLM_BASE_URL=%q\n' "$C2V_LLM_BASE_URL"
            printf 'C2V_LLM_MODEL=%q\n' "$C2V_LLM_MODEL"
            printf 'C2V_LLM_PROVIDER=%q\n' "$C2V_LLM_PROVIDER"
            printf 'C2V_FIX_MODEL=%q\n' "$C2V_FIX_MODEL"
            printf 'C2V_TTS_DOUBAO_KEY=%q\n' "$C2V_TTS_DOUBAO_KEY"
            printf 'DEEPSEEK_API_KEY=%q\n' "$DEEPSEEK_API_KEY"
            printf 'GOOGLE_API_KEY=%q\n' "$GOOGLE_API_KEY"
            printf 'GOOGLE_MODELS=%q\n' "$GOOGLE_MODELS"
            printf 'GOOGLE_VERTEX_PROJECT=%q\n' "$GOOGLE_VERTEX_PROJECT"
            printf 'GOOGLE_VERTEX_LOCATION=%q\n' "$GOOGLE_VERTEX_LOCATION"
            printf 'DEFAULT_MODEL=%q\n' "$DEFAULT_MODEL"
            printf 'MODEL_ROUTES=%q\n' "$MODEL_ROUTES"
            printf 'AUTH_DB_PASSWORD=%q\n' "$AUTH_DB_PASSWORD"
            printf 'AUTH_SESSION_SECRET=%q\n' "$AUTH_SESSION_SECRET"
            printf 'AUTH_ADMIN_IDENTIFIER=%q\n' "$AUTH_ADMIN_IDENTIFIER"
            printf 'AUTH_ADMIN_PASSWORD=%q\n' "$AUTH_ADMIN_PASSWORD"
            printf 'AUTH_PUBLIC_URL=%q\n' "$AUTH_PUBLIC_URL"
            cat <<'REMOTE_SCRIPT'
          cd ~
          rm -rf moonbot-backend-src moonbot-c2v-src moonbot-frontend-src
          mkdir -p moonbot-backend-src moonbot-c2v-src moonbot-frontend-src
          tar xzf backend-deploy.tar -C moonbot-backend-src
          tar xzf c2v-deploy.tar -C moonbot-c2v-src
          tar xzf frontend-deploy.tar -C moonbot-frontend-src

          STATIC_PUBLIC="$HOME/moonbot-static/frontend-public"
          if [ ! -d "$STATIC_PUBLIC" ] || [ -z "$(find "$STATIC_PUBLIC" -type f -print -quit)" ]; then
            echo "ERROR: persistent frontend public directory is missing or empty: $STATIC_PUBLIC" >&2
            echo "Run the static-resource initialization documented in README.md." >&2
            exit 1
          fi
          cp -a "$STATIC_PUBLIC" moonbot-frontend-src/public
          echo "Restored persistent frontend public files:"
          du -sh moonbot-frontend-src/public

          docker network create moonbot-net 2>/dev/null || true

          # Authentication is mandatory for this release. Abort before touching
          # live application containers if any durable credential is missing.
          test -n "$AUTH_DB_PASSWORD" || { echo "FATAL: AUTH_DB_PASSWORD is empty"; exit 1; }
          test -n "$AUTH_SESSION_SECRET" || { echo "FATAL: AUTH_SESSION_SECRET is empty"; exit 1; }
          test -n "$AUTH_ADMIN_IDENTIFIER" || { echo "FATAL: AUTH_ADMIN_IDENTIFIER is empty"; exit 1; }
          test -n "$AUTH_ADMIN_PASSWORD" || { echo "FATAL: AUTH_ADMIN_PASSWORD is empty"; exit 1; }
          [ "${#AUTH_SESSION_SECRET}" -ge 32 ] || { echo "FATAL: AUTH_SESSION_SECRET is too short"; exit 1; }
          [ "${#AUTH_ADMIN_PASSWORD}" -ge 12 ] || { echo "FATAL: AUTH_ADMIN_PASSWORD is too short"; exit 1; }
          case "$AUTH_DB_PASSWORD" in *[!A-Za-z0-9_-]*) echo "FATAL: AUTH_DB_PASSWORD must be URL-safe"; exit 1;; esac
          case "$AUTH_PUBLIC_URL" in
            https://*) AUTH_COOKIE_SECURE_VALUE=true;;
            http://*) AUTH_COOKIE_SECURE_VALUE=false;;
            *) echo "FATAL: AUTH_PUBLIC_URL must use http or https"; exit 1;;
          esac

          # Keep PostgreSQL private on moonbot-net with a named volume. The
          # image is resolved before any existing production container stops.
          docker image inspect postgres:16-alpine >/dev/null 2>&1 || docker pull postgres:16-alpine
          docker volume create moonbot-postgres-data >/dev/null
          if docker inspect moonbot-postgres >/dev/null 2>&1; then
            docker network connect moonbot-net moonbot-postgres 2>/dev/null || true
            docker start moonbot-postgres >/dev/null
          else
            docker run -d --name moonbot-postgres --restart unless-stopped --network moonbot-net \
              -e POSTGRES_DB=moonbot \
              -e POSTGRES_USER=moonbot \
              -e POSTGRES_PASSWORD="$AUTH_DB_PASSWORD" \
              -v moonbot-postgres-data:/var/lib/postgresql/data \
              postgres:16-alpine >/dev/null
          fi
          db_ok=""
          for _ in $(seq 1 30); do
            if docker exec moonbot-postgres pg_isready -U moonbot -d moonbot >/dev/null 2>&1; then
              db_ok=1
              break
            fi
            sleep 2
          done
          [ -n "$db_ok" ] || { echo "FATAL: authentication database is not ready"; exit 1; }
          AUTH_DATABASE_URL="postgresql://moonbot:${AUTH_DB_PASSWORD}@moonbot-postgres:5432/moonbot"

          # code2video (heavy: manim + LaTeX base; layers cache after first build)
          echo "::group::Build code2video image"
          docker build --progress=plain -t moonbot-code2video:ci moonbot-c2v-src
          echo "::endgroup::"

          echo "::group::Build backend image"
          docker build --progress=plain -t moonbot-backend:ci moonbot-backend-src
          echo "::endgroup::"

          echo "::group::Build frontend image"
          docker build --progress=plain -t moonbot-frontend:ci moonbot-frontend-src
          echo "::endgroup::"

          # Runtime-created classrooms/jobs/media and Deep Solve outputs must
          # survive replacement of the release containers. Until the live
          # container is itself mounted to the canonical named volume, sync its
          # writable layer on every attempt. This also covers a previous deploy
          # that seeded the volume but rolled back before promotion.
          LEGACY_VOLUMES_TO_RESYNC=""

          copy_container_path_to_volume() {
            source_container="$1"
            source_path="$2"
            volume_name="$3"
            helper_image="$4"
            (
              set -o pipefail
              docker cp "$source_container:$source_path/." - \
                | docker run --rm -i -v "$volume_name:/target" "$helper_image" tar -C /target -xf -
            )
          }

          clear_named_volume_contents() {
            volume_name="$1"
            helper_image="$2"
            # /target is the exact named volume mount in a disposable helper.
            # Preserve only our readiness marker; the authoritative source
            # remains recoverable in its old container until promotion passes.
            docker run --rm -v "$volume_name:/target" "$helper_image" \
              sh -c 'find /target -mindepth 1 -maxdepth 1 ! -name .moonbot-volume-ready -exec rm -rf -- {} +'
          }

          seed_named_volume() {
            volume_name="$1"
            source_container="$2"
            source_path="$3"
            helper_image="$4"

            docker volume create "$volume_name" >/dev/null
            if ! docker inspect "$source_container" >/dev/null 2>&1; then
              echo "No prior $source_container container; initializing empty $volume_name"
              return
            fi
            if docker inspect -f '{{range .Mounts}}{{println .Name .Destination}}{{end}}' "$source_container" \
              | grep -Fqx "$volume_name $source_path"; then
              echo "$source_container already uses canonical volume $volume_name"
              return
            fi
            if [ "$(docker inspect -f '{{.State.Running}}' "$source_container")" != "true" ]; then
              echo "FATAL: cannot safely migrate $source_container:$source_path while the legacy container is stopped"
              exit 1
            fi
            if ! docker exec "$source_container" test -d "$source_path"; then
              echo "No legacy data at $source_container:$source_path; initializing empty $volume_name"
              clear_named_volume_contents "$volume_name" "$helper_image" || exit 1
              return
            fi

            echo "Syncing legacy data from $source_container:$source_path into $volume_name"
            clear_named_volume_contents "$volume_name" "$helper_image"
            copy_container_path_to_volume "$source_container" "$source_path" "$volume_name" "$helper_image"
            LEGACY_VOLUMES_TO_RESYNC="$LEGACY_VOLUMES_TO_RESYNC $volume_name"
          }

          resync_named_volume_after_stop() {
            volume_name="$1"
            source_container="$2"
            source_path="$3"
            helper_image="$4"
            case " $LEGACY_VOLUMES_TO_RESYNC " in
              *" $volume_name "*) ;;
              *) return;;
            esac
            source_running="$(docker inspect -f '{{.State.Running}}' "$source_container")" \
              || return 1
            if [ "$source_running" = "true" ]; then
              echo "FATAL: refusing final legacy sync while $source_container is still running"
              return 1
            fi
            echo "Final sync after stopping $source_container"
            clear_named_volume_contents "$volume_name" "$helper_image" || return 1
            copy_container_path_to_volume \
              "$source_container" "$source_path" "$volume_name" "$helper_image" || return 1
          }

          initialize_named_volume() {
            volume_name="$1"
            helper_image="$2"
            docker run --rm -v "$volume_name:/target" "$helper_image" \
              sh -c 'touch /target/.moonbot-volume-ready && test -w /target'
          }

          seed_named_volume moonbot-frontend-data moonbot-frontend /app/data moonbot-frontend:ci
          seed_named_volume moonbot-code2video-cases moonbot-code2video /app/CASES moonbot-code2video:ci
          seed_named_volume moonbot-code2video-tts moonbot-code2video /app/src/tts_static moonbot-code2video:ci
          initialize_named_volume moonbot-frontend-data moonbot-frontend:ci
          initialize_named_volume moonbot-code2video-cases moonbot-code2video:ci
          initialize_named_volume moonbot-code2video-tts moonbot-code2video:ci

          # Apply immutable migrations, create the initial administrator once,
          # then prove the release can reach PostgreSQL and authenticate it.
          backfill_classroom_records() {
            docker run --rm --network moonbot-net \
              -v moonbot-frontend-data:/app/data \
              -e DATABASE_URL="$AUTH_DATABASE_URL" \
              moonbot-frontend:ci node scripts/backfill-classroom-records.mjs
          }

          docker run --rm --network moonbot-net \
            -v moonbot-frontend-data:/app/data \
            -e DATABASE_URL="$AUTH_DATABASE_URL" \
            -e ADMIN_IDENTIFIER="$AUTH_ADMIN_IDENTIFIER" \
            -e ADMIN_PASSWORD="$AUTH_ADMIN_PASSWORD" \
            -e ADMIN_NAME="星燧管理员" \
            moonbot-frontend:ci \
            sh -c 'node scripts/migrate-db.mjs && node scripts/create-admin-user.mjs'
          backfill_classroom_records

          # Exercise the real login path with a one-time administrator instead
          # of depending on the bootstrap administrator's password forever.
          # This keeps future deployments working after the owner rotates that
          # password from the admin console.
          AUTH_SMOKE_IDENTIFIER="deploy-smoke-$(date +%s)-$RANDOM@sophos.local"
          AUTH_SMOKE_PASSWORD="$(docker run --rm moonbot-frontend:ci node -e "process.stdout.write(require('node:crypto').randomBytes(24).toString('base64url'))")"
          docker run --rm --network moonbot-net \
            -e DATABASE_URL="$AUTH_DATABASE_URL" \
            -e ADMIN_IDENTIFIER="$AUTH_SMOKE_IDENTIFIER" \
            -e ADMIN_PASSWORD="$AUTH_SMOKE_PASSWORD" \
            -e ADMIN_NAME="Deployment smoke administrator" \
            moonbot-frontend:ci \
            node scripts/create-admin-user.mjs

          remove_auth_smoke() {
            docker run --rm --network moonbot-net \
              -e DATABASE_URL="$AUTH_DATABASE_URL" \
              -e SMOKE_IDENTIFIER="$AUTH_SMOKE_IDENTIFIER" \
              moonbot-frontend:ci \
              node --input-type=module -e 'import pg from "pg"; const pool = new pg.Pool({ connectionString: process.env.DATABASE_URL }); await pool.query("DELETE FROM users WHERE login_identifier = $1", [process.env.SMOKE_IDENTIFIER]); await pool.end();' \
              >/dev/null 2>&1 || true
          }
          trap remove_auth_smoke EXIT

          docker rm -f moonbot-frontend-candidate 2>/dev/null || true
          docker run -d --name moonbot-frontend-candidate --restart no --network moonbot-net \
            -v moonbot-frontend-data:/app/data \
            -e PORT=3000 \
            -e AUTH_ENABLED=true \
            -e DATABASE_URL="$AUTH_DATABASE_URL" \
            -e SESSION_SECRET="$AUTH_SESSION_SECRET" \
            -e AUTH_PUBLIC_URL="$AUTH_PUBLIC_URL" \
            -e AUTH_COOKIE_SECURE="$AUTH_COOKIE_SECURE_VALUE" \
            moonbot-frontend:ci >/dev/null

          frontend_abort() {
            echo "frontend candidate validation FAILED: $1"
            docker logs --tail 50 moonbot-frontend-candidate 2>&1 || true
            docker rm -f moonbot-frontend-candidate 2>/dev/null || true
            echo "existing moonbot-frontend left running; deploy aborted"
            exit 1
          }

          frontend_ok=""
          for _ in $(seq 1 30); do
            code=$(docker exec moonbot-frontend-candidate node -e "fetch('http://127.0.0.1:3000/api/health').then(r=>console.log(r.status)).catch(()=>console.log(0))" 2>/dev/null || echo 0)
            [ "$code" = "200" ] && { frontend_ok=1; break; }
            sleep 2
          done
          [ -n "$frontend_ok" ] || frontend_abort "health endpoint never returned 200"

          docker exec \
            -e SMOKE_IDENTIFIER="$AUTH_SMOKE_IDENTIFIER" \
            -e SMOKE_PASSWORD="$AUTH_SMOKE_PASSWORD" \
            moonbot-frontend-candidate node -e "fetch('http://127.0.0.1:3000/api/auth/login',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({identifier:process.env.SMOKE_IDENTIFIER,password:process.env.SMOKE_PASSWORD})}).then(async r=>{const body=await r.json();console.log(JSON.stringify({event:'admin_login_smoke',status:r.status,success:body.success===true,role:body.user?.role}));if(!r.ok||body.success!==true||body.user?.role!=='admin')process.exit(3)}).catch(()=>process.exit(4))" \
            || frontend_abort "administrator login smoke failed"
          remove_auth_smoke
          trap - EXIT
          docker rm -f moonbot-frontend-candidate >/dev/null

          # --- code2video: fail-safe candidate deployment ------------------
          # A missing/incorrect secret must ABORT the deploy and leave the
          # currently healthy container running, instead of replacing it with a
          # crippled one (the outage this hardening eliminates).
          test "$C2V_LLM_PROVIDER" = "vertex-express" || { echo "FATAL: C2V_LLM_PROVIDER must be 'vertex-express' (got '${C2V_LLM_PROVIDER:-<empty>}')"; exit 1; }
          test -n "$C2V_LLM_MODEL"   || { echo "FATAL: C2V_LLM_MODEL is empty";   exit 1; }
          test -n "$C2V_FIX_MODEL"   || { echo "FATAL: C2V_FIX_MODEL is empty";   exit 1; }
          test -n "$C2V_LLM_API_KEY" || { echo "FATAL: C2V_LLM_API_KEY is empty"; exit 1; }
          # Desensitized config log — never emit key material.
          echo "code2video config: provider=$C2V_LLM_PROVIDER model=$C2V_LLM_MODEL fix_model=$C2V_FIX_MODEL api_key=SET(len=${#C2V_LLM_API_KEY}) tts_mode=off"

          # The egress proxy must be running, else a fresh code2video cannot
          # reach Vertex. Do not create an offline container; keep the old one.
          docker inspect -f '{{.State.Running}}' proxy 2>/dev/null | grep -qx true \
            || { echo "FATAL: proxy container is not running; aborting deploy, keeping current code2video"; exit 1; }

          # Preserve the current container's config for manual rollback.
          docker inspect moonbot-code2video > "moonbot-code2video.prev.inspect.$(date -u +%Y%m%dT%H%M%SZ).json" 2>/dev/null || true

          # vertex-express derives the aiplatform host itself and ignores any
          # OpenAI-compatible base URL; do NOT inject C2V_LLM_BASE_URL here
          # (no /endpoints/openapi). Run the replacement under a candidate name
          # so the live container serves traffic until every gate passes.
          docker rm -f moonbot-code2video-candidate 2>/dev/null || true
          docker run -d --name moonbot-code2video-candidate --restart no --network moonbot-net \
            -v moonbot-code2video-cases:/app/CASES \
            -v moonbot-code2video-tts:/app/src/tts_static \
            -e PORT=8010 \
            -e C2V_LLM_PROVIDER="$C2V_LLM_PROVIDER" \
            -e C2V_LLM_API_KEY="$C2V_LLM_API_KEY" \
            -e C2V_LLM_MODEL="$C2V_LLM_MODEL" \
            -e C2V_FIX_MODEL="$C2V_FIX_MODEL" \
            -e C2V_TTS_DOUBAO_KEY="$C2V_TTS_DOUBAO_KEY" \
            -e C2V_TTS_MODE=off \
            -e HTTP_PROXY=http://proxy:7890 \
            -e HTTPS_PROXY=http://proxy:7890 \
            -e http_proxy=http://proxy:7890 \
            -e https_proxy=http://proxy:7890 \
            -e NO_PROXY=localhost,127.0.0.1,moonbot-tutor-backend,moonbot-code2video,proxy \
            -e no_proxy=localhost,127.0.0.1,moonbot-tutor-backend,moonbot-code2video,proxy \
            moonbot-code2video:ci

          c2v_abort() {
            echo "candidate validation FAILED: $1"
            docker logs --tail 40 moonbot-code2video-candidate 2>&1 | sed -E 's/(x-goog-api-key|api_key|API_KEY)[^ ]*/\1=<redacted>/g' || true
            docker rm -f moonbot-code2video-candidate 2>/dev/null || true
            echo "existing moonbot-code2video left running; deploy aborted"
            exit 1
          }

          # Gate 1 — health endpoint returns 200.
          c2v_ok=""
          for _ in $(seq 1 30); do
            code=$(docker exec moonbot-code2video-candidate python -c "import urllib.request;print(urllib.request.urlopen('http://localhost:8010/',timeout=5).status)" 2>/dev/null || echo 000)
            [ "$code" = "200" ] && { c2v_ok=1; break; }
            sleep 2
          done
          [ -n "$c2v_ok" ] || c2v_abort "health endpoint never returned 200"

          # Gate 2 — implicit proxy egress (trust_env) reaches Vertex (40x = reached).
          pcode=$(docker exec moonbot-code2video-candidate python -c "import httpx;print(httpx.Client(trust_env=True,timeout=20).get('https://aiplatform.googleapis.com/').status_code)" 2>/dev/null || echo 000)
          case "$pcode" in 401|403|404) echo "implicit proxy egress OK (HTTP $pcode)";; *) c2v_abort "implicit proxy egress returned '$pcode' (expected 401/403/404)";; esac

          # Gate 3 — live Vertex smoke returns non-empty content. Keep enough
          # output budget for reasoning-capable models to produce visible text.
          # Log only metadata so failures are diagnosable without leaking output.
          docker exec moonbot-code2video-candidate python -c "import json,os,sys; from gpt_request import invoke_llm; r=invoke_llm(provider=os.environ['C2V_LLM_PROVIDER'],model=os.environ['C2V_LLM_MODEL'],messages=[{'role':'user','content':'Return exactly OK.'}],api_key=os.environ['C2V_LLM_API_KEY'],max_tokens=256); has_content=bool((r.content or '').strip()); print(json.dumps({'event':'vertex_smoke','finish_reason':r.finish_reason,'usage':r.usage,'has_content':has_content}),flush=True); sys.exit(0 if has_content else 3)" || c2v_abort "Vertex smoke returned empty/failed"

          # All gates passed — promote candidate, retire the old container.
          echo "candidate passed all gates; promoting"
          if docker inspect moonbot-code2video >/dev/null 2>&1; then
            docker stop moonbot-code2video >/dev/null
            if ! resync_named_volume_after_stop moonbot-code2video-cases moonbot-code2video /app/CASES moonbot-code2video:ci; then
              docker start moonbot-code2video >/dev/null
              c2v_abort "final migration of legacy CASES output failed"
            fi
            if ! resync_named_volume_after_stop moonbot-code2video-tts moonbot-code2video /app/src/tts_static moonbot-code2video:ci; then
              docker start moonbot-code2video >/dev/null
              c2v_abort "final migration of legacy TTS output failed"
            fi
            docker rename moonbot-code2video "moonbot-code2video-old-$(date -u +%Y%m%dT%H%M%SZ)"
          fi
          docker rename moonbot-code2video-candidate moonbot-code2video
          docker update --restart unless-stopped moonbot-code2video >/dev/null
          docker restart moonbot-code2video

          docker stop moonbot-tutor-backend 2>/dev/null || true
          docker rm   moonbot-tutor-backend 2>/dev/null || true
          docker run -d --name moonbot-tutor-backend --restart unless-stopped --network moonbot-net -p 8088:3000 \
            -e PORT=3000 \
            -e CODE2VIDEO_BASE_URL=http://moonbot-code2video:8010 \
            moonbot-backend:ci

          FRONTEND_OLD="moonbot-frontend-old-$(date -u +%Y%m%dT%H%M%SZ)"
          FRONTEND_PUBLISH="-p 8089:3000"
          [ "$AUTH_COOKIE_SECURE_VALUE" = "false" ] \
            || FRONTEND_PUBLISH="-p 127.0.0.1:8089:3000"
          if docker inspect moonbot-frontend >/dev/null 2>&1; then
            docker stop moonbot-frontend >/dev/null
            if ! resync_named_volume_after_stop moonbot-frontend-data moonbot-frontend /app/data moonbot-frontend:ci; then
              docker start moonbot-frontend >/dev/null
              echo "FATAL: final migration of legacy frontend data failed; previous frontend restored"
              exit 1
            fi
            if ! backfill_classroom_records; then
              docker start moonbot-frontend >/dev/null
              echo "FATAL: final legacy classroom indexing failed; previous frontend restored"
              exit 1
            fi
            docker rename moonbot-frontend "$FRONTEND_OLD"
          fi
          if ! docker run -d --name moonbot-frontend --restart unless-stopped --network moonbot-net $FRONTEND_PUBLISH \
            -v moonbot-frontend-data:/app/data \
            -e PORT=3000 \
            -e AUTH_ENABLED=true \
            -e DATABASE_URL="$AUTH_DATABASE_URL" \
            -e SESSION_SECRET="$AUTH_SESSION_SECRET" \
            -e AUTH_PUBLIC_URL="$AUTH_PUBLIC_URL" \
            -e AUTH_COOKIE_SECURE="$AUTH_COOKIE_SECURE_VALUE" \
            -e ALLOW_LOCAL_NETWORKS=true \
            -e DEFAULT_MODEL="$DEFAULT_MODEL" \
            -e MODEL_ROUTES="$MODEL_ROUTES" \
            -e GOOGLE_API_KEY="$GOOGLE_API_KEY" \
            -e GOOGLE_MODELS="$GOOGLE_MODELS" \
            -e GOOGLE_VERTEX_PROJECT="$GOOGLE_VERTEX_PROJECT" \
            -e GOOGLE_VERTEX_LOCATION="$GOOGLE_VERTEX_LOCATION" \
            -e VIDEO_DEEPSOLVE_BASE_URL=http://moonbot-tutor-backend:3000 \
            -e TTS_DOUBAO_API_KEY="$C2V_TTS_DOUBAO_KEY" \
            -e HTTP_PROXY=http://proxy:7890 \
            -e HTTPS_PROXY=http://proxy:7890 \
            -e http_proxy=http://proxy:7890 \
            -e https_proxy=http://proxy:7890 \
            -e NO_PROXY=localhost,127.0.0.1,moonbot-tutor-backend,moonbot-code2video,proxy \
            -e no_proxy=localhost,127.0.0.1,moonbot-tutor-backend,moonbot-code2video,proxy \
            moonbot-frontend:ci; then
            docker rm -f moonbot-frontend 2>/dev/null || true
            if docker inspect "$FRONTEND_OLD" >/dev/null 2>&1; then
              docker rename "$FRONTEND_OLD" moonbot-frontend
              docker start moonbot-frontend >/dev/null
            fi
            echo "FATAL: failed to start authenticated frontend; previous frontend restored"
            exit 1
          fi

          live_frontend_ok=""
          for _ in $(seq 1 30); do
            code=$(curl -sS -o /dev/null -w '%{http_code}' http://127.0.0.1:8089/api/health || echo 000)
            [ "$code" = "200" ] && { live_frontend_ok=1; break; }
            sleep 2
          done
          if [ -z "$live_frontend_ok" ]; then
            docker logs --tail 50 moonbot-frontend 2>&1 || true
            docker rm -f moonbot-frontend 2>/dev/null || true
            if docker inspect "$FRONTEND_OLD" >/dev/null 2>&1; then
              docker rename "$FRONTEND_OLD" moonbot-frontend
              docker start moonbot-frontend >/dev/null
            fi
            echo "FATAL: authenticated frontend health failed; previous frontend restored"
            exit 1
          fi
          docker rm -f "$FRONTEND_OLD" 2>/dev/null || true

          assert_named_volume_mount() {
            container_name="$1"
            volume_name="$2"
            destination="$3"
            docker inspect -f '{{range .Mounts}}{{println .Name .Destination}}{{end}}' "$container_name" \
              | grep -Fqx "$volume_name $destination" \
              || { echo "FATAL: $container_name is missing $volume_name at $destination"; exit 1; }
          }
          assert_named_volume_mount moonbot-frontend moonbot-frontend-data /app/data
          assert_named_volume_mount moonbot-code2video moonbot-code2video-cases /app/CASES
          assert_named_volume_mount moonbot-code2video moonbot-code2video-tts /app/src/tts_static
          docker exec moonbot-frontend test -f /app/data/.moonbot-volume-ready
          docker exec moonbot-code2video test -f /app/CASES/.moonbot-volume-ready
          docker exec moonbot-code2video test -f /app/src/tts_static/.moonbot-volume-ready

          docker ps --filter name=moonbot --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
          REMOTE_SCRIPT
          } | sshpass -p "$SERVER_PASSWORD" ssh $SSHOPTS "$REMOTE" 'bash -s'
