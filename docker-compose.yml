services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sophosedu}
      POSTGRES_USER: ${POSTGRES_USER:-sophosedu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sophosedu_dev_password}
    volumes:
      - sophosedu-postgres:/var/lib/postgresql/data
    restart: unless-stopped

  openmaic:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://sophosedu:sophosedu_dev_password@postgres:5432/sophosedu}
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
    depends_on:
      - postgres
    volumes:
      # Optional: mount server-providers.yml for provider config
      # - ./server-providers.yml:/app/server-providers.yml:ro
      - openmaic-data:/app/data
    restart: unless-stopped

volumes:
  sophosedu-postgres:
  openmaic-data:
